const colors = ['#4a4a4a','#5b9bd5','#d4789c','#6aab73','#d4956b','#7c6ca8','#c0392b','#2c3e50','#e67e22','#1abc9c'];

  'Mamadera','Chupete','Termometro','Humidificador','Movil para cuna','Gimnasio de actividades',

  'Bloqueador solar bebe','Shampoo bebe','Colonia bebe','Porta documentos bebe',

  '\u{1F430} Conejito','\u{1F43C} Panda','\u{1F427} Pinguino','\u{1F989} Buho','\u{1F433} Ballena',
  '\u{1F42C} Delfin','\u{1F985} Aguila','\u{1F994} Erizo','\u{1F9A6} Nutria','\u{1F99C} Loro',
  '\u{1F422} Tortuga','\u{1F984} Unicornio','\u{1F981} Leon','\u{1F99D} Mapache','\u{1F992} Jirafa'
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randPrice() {
  const ranges = [[5000,15000],[15000,40000],[40000,80000],[80000,200000],[200000,500000],[500000,900000]];
  const [min,max] = pick(ranges);
  return Math.round((min + Math.random() * (max - min)) / 100) * 100;
}
function slugify(t) { return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

async function seed() {
  for (let i = 0; i < 50; i++) {
    const babyName = babyNames[i];
    const slug = slugify(babyName) + '-demo-' + Math.random().toString(36).substring(2,5);
    const color = pick(colors);
    const emoji = pick(emojis);

    // Settings
    await db.ref(`sessions/${slug}/settings`).set({
      babyName,
      customColor: color,
      babyEmoji: emoji,
      eventPlace: pick(['Casa de la abuela','Salon de eventos','Parque','Departamento','Casa de los papas','Quincho','Terraza','Hotel','Restaurant']),
      eventDate: `2026-0${Math.floor(Math.random()*5)+4}-${String(Math.floor(Math.random()*28)+1).padStart(2,'0')}`,
      eventTime: `${String(Math.floor(Math.random()*6)+14).padStart(2,'0')}:${pick(['00','30'])}`,
    });

    // Gifts (random 5-15)
    const numGifts = Math.floor(Math.random() * 11) + 5;
    const shuffledGifts = [...giftNames].sort(() => Math.random() - 0.5).slice(0, numGifts);
    const usedAnimals = [];

    for (const giftName of shuffledGifts) {
      const isUnlimited = ['Ropa recien nacido','Calcetines','Pañales','Body manga larga','Pijama enterito'].includes(giftName) && Math.random() > 0.5;
      const gift = {
        name: giftName,
        image: '',
        link: '',
        price: randPrice(),
        unlimited: isUnlimited || false,
        reservedBy: null,
        reservedByAnimal: null,
      };

      // Random chance of being reserved (60%)
      if (Math.random() > 0.4) {
        const person = pick(firstNames) + ' ' + pick(lastNames);
        const animal = animals.find(a => !usedAnimals.includes(a)) || pick(animals);
        usedAnimals.push(animal);

        if (isUnlimited) {
          const ref = await db.ref(`sessions/${slug}/gifts`).push(gift);
          // Add 1-3 reservers
          const numReservers = Math.floor(Math.random() * 3) + 1;
          for (let r = 0; r < numReservers; r++) {
            const rPerson = pick(firstNames) + ' ' + pick(lastNames);
            const rAnimal = animals.find(a => !usedAnimals.includes(a)) || pick(animals);
            usedAnimals.push(rAnimal);
            await db.ref(`sessions/${slug}/gifts/${ref.key}/reservedByList`).push({ name: rPerson, animal: rAnimal });
          }
          continue;
        } else {
          gift.reservedBy = person;
          gift.reservedByAnimal = animal;
        }
      }

      await db.ref(`sessions/${slug}/gifts`).push(gift);
    }

    log(`${i + 1}/50 - ${babyName} (${slug}) - ${numGifts} regalos`);
  }
  log('\n--- LISTO! 50 sesiones demo creadas ---');
}

seed();
</script>
