<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beibi Shower — Lista de Regalos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #7c6ca8;
    --primary-light: #ede8f5;
    --primary-dark: #5a4d80;
    --accent: #f5a623;
    --bg: #f8f6fc;
    --card-bg: #ffffff;
    --text: #2d2640;
    --text-secondary: #8a829d;
    --border: #e8e4f0;
    --danger: #e74c3c;
    --success: #27ae60;
    --gradient-opacity: 0.7;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.05);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 20% 20%, var(--primary-light) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, var(--primary-light) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.6) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.7;
  }
  body > * { position: relative; z-index: 1; }
  #app { position: relative; z-index: 1; }

  /* HEADER */
  .header {
    padding: 40px 20px 28px;
    text-align: center;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60%;
    left: -20%;
    width: 140%;
    height: 200%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .header .baby-icon {
    font-size: 42px;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }
  .header .logo {
    width: 120px;
    height: 120px;
    margin: 0 auto 12px;
    display: block;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
    border-radius: 50%;
    object-fit: cover;
    background: rgba(255,255,255,0.15);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    position: relative;
  }
  .header .baby-name {
    font-size: 16px;
    opacity: 0.9;
    margin-top: 6px;
    font-weight: 500;
    position: relative;
  }
  .header p {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 4px;
    position: relative;
  }

  /* NAV */
  .nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 14px 20px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .nav button {
    padding: 9px 22px;
    border-radius: var(--radius-xl);
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.25s ease;
    background: var(--primary-light);
    color: var(--primary);
    font-family: inherit;
  }
  .nav button:hover { background: var(--primary); color: #fff; }
  .nav button.active {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(124,108,168,0.3);
  }

  /* GRID */
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 28px 20px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 18px;
    padding: 8px 20px 20px;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-sm);
  }
  .card:not(.reserved):hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }
  .card.reserved { opacity: 0.6; }
  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    background: var(--primary-light);
    display: block;
  }
  .card .placeholder {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, var(--primary-light), #f0ecf8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }
  .card-body { padding: 16px; }
  .card-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; color: var(--text); }
  .card-price {
    font-size: 20px;
    font-weight: 700;
    margin: 8px 0;
    color: var(--primary);
  }
  .card .badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--primary);
    color: #fff;
    padding: 5px 14px;
    border-radius: var(--radius-xl);
    font-size: 11px;
    font-weight: 600;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .card .reserved-by {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-style: italic;
  }
  .card-actions { display: flex; gap: 8px; margin-top: 4px; }

  /* BUTTONS */
  .btn {
    padding: 11px 20px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    width: 100%;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 6px rgba(124,108,168,0.25);
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--primary-light); color: var(--primary); }
  .btn-secondary:hover { background: #ddd5ee; }
  .btn-danger { background: #fdecea; color: var(--danger); }
  .btn-danger:hover { background: #f9d5d0; }
  .btn-warn { background: #fff3e0; color: #e65100; }
  .btn-warn:hover { background: #ffe0b2; }
  .btn-sm { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; width: auto; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-link {
    color: var(--primary);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 0;
    text-decoration: none;
    text-align: center;
    white-space: nowrap;
  }

  /* FORMS */
  .input {
    width: 100%;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: all 0.2s ease;
    background: var(--card-bg);
    color: var(--text);
  }
  .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,108,168,0.12); }
  .input::placeholder { color: var(--text-secondary); }

  .admin-form {
    background: var(--card-bg);
    margin: 20px;
    border-radius: var(--radius-md);
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .admin-form h3 { margin-bottom: 16px; font-size: 16px; color: var(--text); }
  .form-grid { display: flex; flex-direction: column; gap: 12px; }
  .form-row { display: flex; gap: 12px; }
  .form-row .input { flex: 1; }

  .admin-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .admin-row:last-child { border-bottom: none; }
  .admin-row .info { flex: 1; min-width: 0; }
  .admin-row .info p:first-child { font-weight: 600; font-size: 14px; }
  .admin-row .info p:last-child { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .admin-row .info .reserved-link { margin-left: 8px; color: var(--primary); font-weight: 600; }
  .admin-list { padding: 0 20px 40px; }

  /* SETTINGS */
  .settings-section {
    background: var(--card-bg);
    margin: 20px;
    border-radius: var(--radius-md);
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .settings-section h3 {
    margin-bottom: 20px;
    font-size: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .setting-group { margin-bottom: 20px; }
  .setting-group:last-child { margin-bottom: 0; }
  .setting-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .color-themes {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .color-picker-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .color-picker-hex {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 200px;
  }
  .color-preview {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    position: relative;
  }
  .color-preview input[type="color"] {
    position: absolute;
    top: -8px;
    left: -8px;
    width: 56px;
    height: 56px;
    border: none;
    cursor: pointer;
    opacity: 0;
  }
  .hex-input {
    width: 100px;
    font-family: monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* EMOJI PICKER */
  .emoji-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .emoji-option {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .emoji-option:hover { transform: scale(1.1); border-color: var(--primary); }
  .emoji-option.active {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 2px var(--primary-light);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 20px;
    animation: fadeOverlay 0.2s ease;
  }
  @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 400px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .modal h3 { margin-bottom: 16px; font-size: 18px; color: var(--text); }
  .modal .sub { color: var(--text-secondary); font-size: 14px; margin: -12px 0 20px; }
  .modal .error { color: var(--danger); font-size: 12px; margin-top: 8px; }
  .modal .btn { margin-top: 16px; }
  .modal .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .modal .btn-row .btn { margin-top: 0; }

  /* PIN */
  .pin-input { text-align: center; font-size: 24px; letter-spacing: 8px; }
  .pin-input.error { border-color: var(--danger); }

  /* NOTIFICATION */
  .notif {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: var(--primary);
    color: #fff;
    padding: 12px 28px;
    border-radius: var(--radius-xl);
    font-size: 13px;
    font-weight: 600;
    animation: notifIn 0.35s ease;
    box-shadow: var(--shadow-md);
  }
  .notif.error { background: var(--danger); }
  @keyframes notifIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-15px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .loading { display: flex; gap: 6px; justify-content: center; padding: 80px 0; }
  .loading .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--primary);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading .dot:nth-child(2) { animation-delay: 0.2s; }
  .loading .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 24px 20px 32px;
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.6;
  }

  /* COUNTER STATS */
  .stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 16px 20px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    text-align: center;
  }
  .stat-number {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    font-weight: 600;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- Firebase SDK (compat mode for simplicity) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// ============================================================
// CONFIGURACION — Reemplaza con tus datos de Firebase
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAkOS71G8PvL9xzERJ3DtW8ohBVy5WIXmk",
  authDomain: "beibi-shower.firebaseapp.com",
  databaseURL: "https://beibi-shower-default-rtdb.firebaseio.com",
  projectId: "beibi-shower",
  storageBucket: "beibi-shower.firebasestorage.app",
  messagingSenderId: "518768252435",
  appId: "1:518768252435:web:686fb6db0d19ce500bd1e6"
};

const ADMIN_PIN = "1234";
// ============================================================

// --- BABY EMOJI OPTIONS ---
const BABY_EMOJIS = [
  '\u{1F476}', '\u{1F476}\u{1F3FB}', '\u{1F476}\u{1F3FC}', '\u{1F476}\u{1F3FD}', '\u{1F476}\u{1F3FE}', '\u{1F476}\u{1F3FF}',
  '\u{1F47C}', '\u{1F37C}', '\u{1FA77}', '\u{2B50}', '\u{1F31F}', '\u{1F49B}'
];

const DEFAULT_SETTINGS = {
  babyName: 'Kai',
  customColor: '#7c6ca8',
  babyEmoji: '\u{1F476}',
};

firebase.initializeApp(FIREBASE_CONFIG);
const dbGifts = firebase.database().ref("gifts");
const dbSettings = firebase.database().ref("settings");

let gifts = {};
let appSettings = { ...DEFAULT_SETTINGS };
let currentView = "guest";
let editingId = null;
let notifTimer = null;
let dataLoaded = false;

// --- HELPERS ---
const $ = sel => document.querySelector(sel);
const formatPrice = p => Number(p).toLocaleString("es-CL", { style: "currency", currency: "CLP", minimumFractionDigits: 0 });
const giftList = () => Object.entries(gifts).map(([id, g]) => ({ id, ...g }));
const available = () => giftList().filter(g => !g.reservedBy || g.unlimited);
const reserved = () => giftList().filter(g => g.reservedBy && !g.unlimited);

function hexToHSL(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  let max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    let d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1-l);
  const f = n => { const k = (n + h/30) % 12; const c = l - a * Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function applyTheme(hex) {
  if (!hex || !/^#[0-9a-fA-F]{6}$/.test(hex)) hex = '#7c6ca8';
  const [h, s, l] = hexToHSL(hex);
  const root = document.documentElement.style;
  root.setProperty('--primary', hex);
  root.setProperty('--primary-light', hslToHex(h, Math.min(s, 30), 93));
  root.setProperty('--primary-dark', hslToHex(h, s, Math.max(l - 15, 20)));
  root.setProperty('--bg', hslToHex(h, Math.min(s, 20), 97));
  root.setProperty('--border', hslToHex(h, Math.min(s, 25), 90));
}

function notify(msg, type = "success") {
  clearTimeout(notifTimer);
  let el = document.getElementById("notif");
  if (!el) { el = document.createElement("div"); el.id = "notif"; document.body.appendChild(el); }
  el.className = "notif" + (type === "error" ? " error" : "");
  el.textContent = msg;
  el.style.display = "block";
  notifTimer = setTimeout(() => el.style.display = "none", 2500);
}

// --- FIREBASE LISTENERS ---
dbGifts.on("value", snap => {
  gifts = snap.val() || {};
  if (dataLoaded) render();
});

dbSettings.on("value", snap => {
  const s = snap.val();
  if (s) {
    appSettings = { ...DEFAULT_SETTINGS, ...s };
  }
  applyTheme(appSettings.customColor);
  document.title = `Beibi Shower de ${appSettings.babyName} \u2014 Lista de Regalos`;
  dataLoaded = true;
  render();
});

// --- RENDER ---
function render() {
  const app = $("#app");
  const av = available();
  const res = reserved();
  const total = giftList().length;

  app.innerHTML = `
    <div class="header">
      <img class="logo" src="assets/beibi-shower-logo.svg" alt="Beibi Shower" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="baby-icon" style="display:none">${appSettings.babyEmoji || '\u{1F476}'}</span>
      <h1>Beibi Shower de ${esc(appSettings.babyName)}</h1>
      <div class="baby-name">Lista de regalos</div>
    </div>
    ${currentView === 'guest' && total > 0 ? `
    <div class="stats">
      <div class="stat">
        <div class="stat-number">${av.length}</div>
        <div class="stat-label">Disponibles</div>
      </div>
      <div class="stat">
        <div class="stat-number">${res.length}</div>
        <div class="stat-label">Reservados</div>
      </div>
      <div class="stat">
        <div class="stat-number">${total}</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
    ` : ''}
    <div class="nav">
      <button class="${currentView === 'guest' ? 'active' : ''}" onclick="switchView('guest')">
        \u{1F381} Regalos
      </button>
      <button class="${currentView === 'admin' ? 'active' : ''}" onclick="${currentView === 'admin' ? '' : 'showPinModal()'}">
        \u{1F512} Admin
      </button>
    </div>
    <div id="content">
      ${currentView === "guest" ? renderGuest() : renderAdmin()}
    </div>
    <div class="footer">Hecho con \u2764\uFE0F para ${esc(appSettings.babyName)}</div>
  `;
}

function renderGuest() {
  const av = available();
  const res = reserved();
  if (giftList().length === 0) return '<div class="empty">\u{1F381} Aun no hay regalos en la lista</div>';

  let html = "";
  if (av.length > 0) {
    html += `<p class="section-title">Disponibles</p><div class="grid">`;
    av.forEach(g => {
      const reservers = g.unlimited && g.reservedByList ? Object.values(g.reservedByList) : [];
      html += `
        <div class="card">
          ${g.unlimited ? '<div class="badge" style="background:var(--success)">\u221E Ilimitado</div>' : ''}
          ${g.image ? `<img src="${esc(g.image)}" alt="${esc(g.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="placeholder" style="${g.image ? 'display:none' : ''}">\u{1F381}</div>
          <div class="card-body">
            <p class="card-name">${esc(g.name)}</p>
            <p class="card-price">${formatPrice(g.price)}</p>
            ${reservers.length > 0 ? `<p class="reserved-by">\u{1F64B} ${reservers.map(r => esc(r)).join(', ')}</p>` : ''}
            <div class="card-actions">
              <button class="btn btn-primary" style="flex:1" onclick="showReserveModal('${g.id}')">Lo llevo yo \u{1F64B}</button>
              ${g.link ? `<a href="${esc(g.link)}" target="_blank" rel="noopener" class="btn btn-secondary" style="flex:0;text-decoration:none;text-align:center;white-space:nowrap">Ver \u2197</a>` : ''}
            </div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  if (res.length > 0) {
    html += `<p class="section-title">Ya reservados (${res.length})</p><div class="grid">`;
    res.forEach(g => {
      html += `
        <div class="card reserved">
          <div class="badge">\u2713 Reservado</div>
          ${g.image ? `<img src="${esc(g.image)}" alt="${esc(g.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="placeholder" style="${g.image ? 'display:none' : ''}">\u{1F381}</div>
          <div class="card-body">
            <p class="card-name">${esc(g.name)}</p>
            <p class="card-price">${formatPrice(g.price)}</p>
            <p class="reserved-by">por ${esc(g.reservedBy)}</p>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderAdmin() {
  const all = giftList();
  const editing = editingId ? gifts[editingId] : null;

  let html = `
    <div class="settings-section">
      <h3>\u2699\uFE0F Personalizar</h3>
      <div class="setting-group">
        <div class="setting-label">Nombre del bebe</div>
        <div style="display:flex;gap:8px">
          <input class="input" id="s-baby-name" placeholder="Nombre" value="${esc(appSettings.babyName)}">
          <button class="btn btn-primary" style="width:auto;white-space:nowrap" onclick="saveBabyName()">Guardar</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Icono del bebe</div>
        <div class="emoji-grid">
          ${BABY_EMOJIS.map(e => `
            <button class="emoji-option ${(appSettings.babyEmoji || '\u{1F476}') === e ? 'active' : ''}"
                    onclick="saveEmoji('${e}')">${e}</button>
          `).join('')}
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Color del tema</div>
        <div class="color-picker-row">
          <div class="color-picker-hex">
            <div class="color-preview" style="background:${appSettings.customColor || '#7c6ca8'}">
              <input type="color" id="s-color-native" value="${appSettings.customColor || '#7c6ca8'}" onchange="onColorPick(this.value)">
            </div>
            <input class="input hex-input" id="s-color-hex" placeholder="#7c6ca8" value="${appSettings.customColor || '#7c6ca8'}" maxlength="7"
              onkeydown="if(event.key==='Enter')applyHexColor()">
            <button class="btn btn-primary" style="width:auto;white-space:nowrap" onclick="applyHexColor()">Aplicar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="admin-form">
      <h3>${editing ? '\u270F\uFE0F Editar regalo' : '\u2795 Agregar regalo'}</h3>
      <div class="form-grid">
        <input class="input" id="f-name" placeholder="Nombre del regalo *" value="${editing ? esc(editing.name) : ''}">
        <input class="input" id="f-image" placeholder="URL de la imagen" value="${editing ? esc(editing.image || '') : ''}">
        <input class="input" id="f-link" placeholder="Link de compra" value="${editing ? esc(editing.link || '') : ''}">
        <input class="input" id="f-price" placeholder="Precio (CLP) *" type="number" value="${editing ? editing.price : ''}">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--text-secondary)">
          <input type="checkbox" id="f-unlimited" ${editing && editing.unlimited ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--primary)">
          Permite multiples reservas (ropa, calcetines, etc.)
        </label>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="saveGift()">
            ${editing ? 'Guardar cambios' : 'Agregar'}
          </button>
          ${editing ? '<button class="btn btn-secondary" onclick="cancelEdit()">Cancelar</button>' : ''}
        </div>
      </div>
    </div>
    <p class="section-title">Regalos (${all.length})</p>
    <div class="admin-list">
  `;

  if (all.length === 0) {
    html += '<div class="empty">Agrega el primer regalo arriba</div>';
  } else {
    all.forEach(g => {
      const reservers = g.unlimited && g.reservedByList ? Object.values(g.reservedByList) : [];
      const hasReservers = g.reservedBy || reservers.length > 0;
      html += `
        <div class="admin-row">
          <div class="info">
            <p>${esc(g.name)}${g.unlimited ? ' <span style="font-size:11px;color:var(--success);font-weight:600">\u221E</span>' : ''}</p>
            <p>${formatPrice(g.price)}${g.reservedBy && !g.unlimited ? `<span class="reserved-link">\u2192 ${esc(g.reservedBy)}</span>` : ''}${reservers.length > 0 ? `<span class="reserved-link">\u2192 ${reservers.map(r => esc(r)).join(', ')}</span>` : ''}</p>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="startEdit('${g.id}')">Editar</button>
          ${hasReservers ? `<button class="btn btn-warn btn-sm" onclick="unreserve('${g.id}')">Liberar</button>` : ''}
          <button class="btn btn-danger btn-sm" onclick="showDeleteModal('${g.id}')">\u2715</button>
        </div>`;
    });
  }
  html += `</div>`;
  return html;
}

// --- ACTIONS ---
function switchView(v) { currentView = v; render(); }

function showPinModal() {
  showModal(`
    <h3>\u{1F512} Ingresa el PIN</h3>
    <input class="input pin-input" id="pin" type="password" maxlength="4" placeholder="\u2022\u2022\u2022\u2022" autofocus
      onkeydown="if(event.key==='Enter')checkPin()">
    <div id="pin-error"></div>
    <button class="btn btn-primary" onclick="checkPin()">Entrar</button>
  `);
  setTimeout(() => { const el = document.getElementById("pin"); if (el) el.focus(); }, 100);
}

function checkPin() {
  const pin = document.getElementById("pin").value;
  if (pin === ADMIN_PIN) {
    currentView = "admin";
    closeModal();
    render();
  } else {
    document.getElementById("pin").classList.add("error");
    document.getElementById("pin-error").innerHTML = '<p class="error">PIN incorrecto</p>';
  }
}

function saveGift() {
  const name = $("#f-name").value.trim();
  const image = $("#f-image").value.trim();
  const link = $("#f-link").value.trim();
  const price = $("#f-price").value;
  const unlimited = $("#f-unlimited").checked;
  if (!name || !price) return notify("Completa nombre y precio", "error");

  const data = { name, image, link, price: Number(price), unlimited, reservedBy: null };

  if (editingId) {
    const prev = gifts[editingId];
    data.reservedBy = prev.reservedBy || null;
    if (prev.reservedByList) data.reservedByList = prev.reservedByList;
    dbGifts.child(editingId).set(data);
    editingId = null;
    notify("Regalo actualizado");
  } else {
    dbGifts.push(data);
    notify("Regalo agregado");
  }
}

function startEdit(id) {
  editingId = id;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function cancelEdit() { editingId = null; render(); }

function showDeleteModal(id) {
  const g = gifts[id];
  showModal(`
    <h3>\u26A0\uFE0F Eliminar regalo</h3>
    <p class="sub">\u00BFSeguro que quieres eliminar "${esc(g.name)}"?</p>
    <div class="btn-row">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1;background:var(--danger)" onclick="deleteGift('${id}')">Eliminar</button>
    </div>
  `);
}

function deleteGift(id) { dbGifts.child(id).remove(); closeModal(); notify("Regalo eliminado"); }

function showReserveModal(id) {
  const g = gifts[id];
  showModal(`
    <h3>\u{1F381} Reservar regalo</h3>
    <p class="sub">${esc(g.name)} \u2014 ${formatPrice(g.price)}</p>
    <div style="display:flex;flex-direction:column;gap:12px">
      <input class="input" id="guest-name" placeholder="Tu nombre *" autofocus
        onkeydown="if(event.key==='Enter')document.getElementById('guest-lastname').focus()">
      <input class="input" id="guest-lastname" placeholder="Tu apellido *"
        onkeydown="if(event.key==='Enter')reserveGift('${id}')">
    </div>
    <button class="btn btn-primary" onclick="reserveGift('${id}')">Confirmar reserva</button>
  `);
  setTimeout(() => { const el = document.getElementById("guest-name"); if (el) el.focus(); }, 100);
}

function reserveGift(id) {
  const name = document.getElementById("guest-name").value.trim();
  const lastname = document.getElementById("guest-lastname").value.trim();
  if (!name || !lastname) return notify("Ingresa tu nombre y apellido", "error");
  const fullName = name + " " + lastname;
  const gift = gifts[id];
  if (gift && gift.unlimited) {
    dbGifts.child(id).child("reservedByList").push(fullName);
  } else {
    dbGifts.child(id).update({ reservedBy: fullName });
  }
  closeModal();
  notify("Regalo reservado a tu nombre");
}

function unreserve(id) {
  const gift = gifts[id];
  if (gift && gift.unlimited) {
    dbGifts.child(id).child("reservedByList").remove();
  } else {
    dbGifts.child(id).update({ reservedBy: null });
  }
  notify("Reserva cancelada");
}

// --- SETTINGS ---
function saveBabyName() {
  const name = document.getElementById("s-baby-name").value.trim();
  if (!name) return notify("Ingresa un nombre", "error");
  dbSettings.update({ babyName: name });
  notify("Nombre actualizado");
}

function saveEmoji(emoji) {
  dbSettings.update({ babyEmoji: emoji });
  notify("Icono actualizado");
}

function onColorPick(hex) {
  const hexInput = document.getElementById("s-color-hex");
  if (hexInput) hexInput.value = hex;
  applyTheme(hex);
  dbSettings.update({ customColor: hex });
  notify("Color actualizado");
}

function applyHexColor() {
  let hex = document.getElementById("s-color-hex").value.trim();
  if (!hex.startsWith('#')) hex = '#' + hex;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return notify("Ingresa un color hex valido (ej: #7c6ca8)", "error");
  const nativePicker = document.getElementById("s-color-native");
  if (nativePicker) nativePicker.value = hex;
  applyTheme(hex);
  dbSettings.update({ customColor: hex });
  notify("Color actualizado");
}

// --- MODAL UTILS ---
function showModal(content) {
  let overlay = document.getElementById("modal-overlay");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "modal-overlay";
    overlay.className = "modal-overlay";
    overlay.onclick = e => { if (e.target === overlay) closeModal(); };
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<div class="modal">${content}</div>`;
  overlay.style.display = "flex";
}

function closeModal() {
  const overlay = document.getElementById("modal-overlay");
  if (overlay) overlay.style.display = "none";
}

function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
