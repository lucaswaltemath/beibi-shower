<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beibi Shower — Lista de Regalos</title>
<link rel="icon" type="image/png" href="assets/beibi-favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #4a4a4a;
    --primary-light: #ede8f5;
    --primary-dark: #5a4d80;
    --accent: #f5a623;
    --bg: #f8f6fc;
    --card-bg: #ffffff;
    --text: #2d2640;
    --text-secondary: #8a829d;
    --border: #e8e4f0;
    --danger: #e74c3c;
    --success: #27ae60;
    --gradient-opacity: 0.7;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.05);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 10% 0%, var(--primary-light) 0%, transparent 45%),
      radial-gradient(ellipse at 90% 100%, var(--primary-light) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.5) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    opacity: 1;
  }
  body > * { position: relative; z-index: 1; }
  #app { position: relative; z-index: 1; }

  /* HEADER */
  .header {
    padding: 48px 20px 36px;
    text-align: center;
    background: linear-gradient(160deg, var(--primary), var(--primary-dark));
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -30%;
    width: 160%;
    height: 200%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.12) 0%, transparent 65%);
    pointer-events: none;
  }
  .header .logo {
    max-width: 220px;
    height: auto;
    margin: 0 auto 16px;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15)) brightness(0) invert(1);
  }
  .header .baby-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 4px;
    position: relative;
  }
  .header .baby-line .baby-icon {
    font-size: 28px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.15));
    line-height: 1;
  }
  .header .baby-line .baby-name-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .header .subtitle {
    font-size: 14px;
    opacity: 0.75;
    margin-top: 6px;
    font-weight: 400;
    position: relative;
    letter-spacing: 0.3px;
  }
  .header .event-bar {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 12px;
    letter-spacing: 0.2px;
    position: relative;
  }
  .header .help-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-family: inherit;
    z-index: 2;
  }
  .header .help-btn:hover {
    background: rgba(255,255,255,0.3);
    border-color: rgba(255,255,255,0.8);
  }

  /* NAV */
  .nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 16px 20px;
    background: transparent;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.75);
    border-bottom: 1px solid var(--border);
  }
  .nav button {
    padding: 10px 28px;
    border-radius: var(--radius-xl);
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.25s ease;
    background: var(--primary-light);
    color: var(--primary);
    font-family: inherit;
  }
  .nav button:hover { background: var(--primary); color: #fff; }
  .nav button.active {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 3px 10px rgba(124,108,168,0.3);
  }

  /* VIEW CONTROLS */
  .view-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 12px;
    padding-left: 12px;
    border-left: 1px solid var(--border);
  }
  .sort-select {
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    font-size: 12px;
    font-family: inherit;
    color: var(--text-secondary);
    background: var(--card-bg);
    cursor: pointer;
    outline: none;
  }
  .sort-select:focus { border-color: var(--primary); }
  .view-toggle {
    display: flex;
    gap: 4px;
  }
  .view-btn-label {
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.2s;
  }
  .view-btn-label:hover { background: var(--primary-light); color: var(--primary); }
  .view-btn-label.active { background: var(--primary-light); color: var(--primary); }

  /* GRID */
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 24px 20px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .grid, .grid-lg {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 18px;
    padding: 8px 20px 20px;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-sm);
  }
  .card:not(.reserved):hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }
  .card.reserved { opacity: 0.6; }
  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    background: var(--primary-light);
    display: block;
  }
  .card .placeholder {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, var(--primary-light), #f0ecf8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }
  .card-body { padding: 16px; }
  .card-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-name:hover {
    white-space: normal;
    overflow: visible;
  }
  .card-price {
    font-size: 20px;
    font-weight: 700;
    margin: 8px 0;
    color: var(--primary);
  }
  .card .badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--primary);
    color: #fff;
    padding: 5px 14px;
    border-radius: var(--radius-xl);
    font-size: 11px;
    font-weight: 600;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .card .reserved-by {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-style: italic;
  }
  /* LIST VIEW */
  .list-view {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 8px 20px 20px;
  }
  .list-view .card {
    display: flex;
    flex-direction: row;
    border-radius: var(--radius-sm);
  }
  .list-view .card img {
    width: 100px;
    height: 100px;
    min-width: 100px;
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  }
  .list-view .card .placeholder {
    width: 100px;
    height: 100px;
    min-width: 100px;
    font-size: 28px;
  }
  .list-view .card-body {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 16px;
    padding: 12px 16px;
    flex: 1;
    min-width: 0;
  }
  .list-view .card-name { flex: 1; min-width: 120px; margin-bottom: 0; }
  .list-view .card-price { margin: 0; font-size: 16px; }
  .list-view .card-actions { margin-top: 0; }
  .list-view .badge { top: 8px; right: 8px; font-size: 10px; padding: 3px 8px; }

  .card-reservers-count {
    font-size: 12px;
    vertical-align: middle;
    cursor: default;
    letter-spacing: -2px;
    margin-left: 4px;
  }
  .card-actions { display: flex; gap: 8px; margin-top: 4px; }

  /* BUTTONS */
  .btn {
    padding: 11px 20px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    width: 100%;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 6px rgba(124,108,168,0.25);
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--primary-light); color: var(--primary); }
  .btn-secondary:hover { background: #ddd5ee; }
  .btn-danger { background: #fdecea; color: var(--danger); }
  .btn-danger:hover { background: #f9d5d0; }
  .btn-warn { background: #fff3e0; color: #e65100; }
  .btn-warn:hover { background: #ffe0b2; }
  .btn-sm { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; width: auto; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-link {
    color: var(--primary);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 0;
    text-decoration: none;
    text-align: center;
    white-space: nowrap;
  }

  /* FORMS */
  .input {
    width: 100%;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: all 0.2s ease;
    background: var(--card-bg);
    color: var(--text);
  }
  .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,108,168,0.12); }
  .input::placeholder { color: var(--text-secondary); }

  .admin-form {
    background: var(--card-bg);
    margin: 20px;
    border-radius: var(--radius-md);
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .admin-form h3 { margin-bottom: 16px; font-size: 16px; color: var(--text); }
  .form-grid { display: flex; flex-direction: column; gap: 14px; }
  .field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .form-row { display: flex; gap: 12px; }
  .form-row .input { flex: 1; }

  .admin-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .admin-row:last-child { border-bottom: none; }
  .admin-row .info { flex: 1; min-width: 0; }
  .admin-row .info p:first-child { font-weight: 600; font-size: 14px; }
  .admin-row .info p:last-child { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .admin-row .info .reserved-link { margin-left: 8px; color: var(--primary); font-weight: 600; }
  .admin-list { padding: 0 20px 40px; }

  /* ADMIN STATS */
  .admin-stats-card {
    background: var(--card-bg);
    margin: 20px;
    border-radius: var(--radius-md);
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .admin-stats-card h3 { font-size: 16px; margin-bottom: 16px; color: var(--text); }
  .admin-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
  }
  .admin-stat-item { text-align: center; }
  .admin-stat-value {
    display: block;
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.2;
  }
  .admin-stat-desc {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .admin-progress {
    height: 8px;
    background: var(--primary-light);
    border-radius: 4px;
    margin-top: 20px;
    overflow: hidden;
  }
  .admin-progress-bar {
    height: 100%;
    background: var(--primary);
    border-radius: 4px;
    transition: width 0.5s ease;
    min-width: 2px;
  }
  .admin-progress-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
    text-align: center;
  }

  /* SETTINGS */
  .settings-section {
    background: var(--card-bg);
    margin: 20px;
    border-radius: var(--radius-md);
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .settings-section h3 {
    margin-bottom: 20px;
    font-size: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .setting-group { margin-bottom: 20px; }
  .setting-group:last-child { margin-bottom: 0; }
  .setting-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .color-themes {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .color-picker-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .color-picker-hex {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 200px;
  }
  .color-preview {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    position: relative;
  }
  .color-preview input[type="color"] {
    position: absolute;
    top: -8px;
    left: -8px;
    width: 56px;
    height: 56px;
    border: none;
    cursor: pointer;
    opacity: 0;
  }
  .hex-input {
    width: 100px;
    font-family: monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* EMOJI PICKER */
  .emoji-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .emoji-option {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .emoji-option:hover { transform: scale(1.1); border-color: var(--primary); }
  .emoji-option.active {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 2px var(--primary-light);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 20px;
    animation: fadeOverlay 0.2s ease;
  }
  @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 400px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .modal h3 { margin-bottom: 16px; font-size: 18px; color: var(--text); }
  .modal .sub { color: var(--text-secondary); font-size: 14px; margin: -12px 0 20px; }
  .modal .error { color: var(--danger); font-size: 12px; margin-top: 8px; }
  .modal .btn { margin-top: 16px; }
  .modal .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .modal .btn-row .btn { margin-top: 0; }

  /* PIN */
  .pin-input { text-align: center; font-size: 24px; letter-spacing: 8px; }
  .pin-input.error { border-color: var(--danger); }

  /* NOTIFICATION */
  .notif {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: var(--primary);
    color: #fff;
    padding: 12px 28px;
    border-radius: var(--radius-xl);
    font-size: 13px;
    font-weight: 600;
    animation: notifIn 0.35s ease;
    box-shadow: var(--shadow-md);
  }
  .notif.error { background: var(--danger); }
  @keyframes notifIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-15px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* LANDING PAGE */
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
    background: #fafafa;
  }
  .landing-logo {
    max-width: 180px;
    height: auto;
    margin-bottom: 20px;
  }
  .landing-sub {
    font-size: 16px;
    color: #888;
    margin-bottom: 36px;
    max-width: 320px;
    line-height: 1.6;
  }
  .chile-flag {
    display: inline-block;
    vertical-align: middle;
    margin-left: 2px;
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
  }
  .landing-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    border: 1px solid #eee;
  }
  .landing-card h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
    color: #1a1a1a;
  }
  .landing-card .input {
    border-color: #ddd;
    color: #1a1a1a;
  }
  .landing-card .input:focus {
    border-color: #1a1a1a;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }
  .landing-card .input::placeholder { color: #aaa; }
  .landing-card .btn-primary {
    background: #1a1a1a;
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .landing-card .btn-primary:hover { background: #333; }
  .landing-stats {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 32px;
    padding: 20px 28px;
    background: #fff;
    border-radius: 14px;
    border: 1px solid #eee;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .landing-stat { text-align: center; }
  .landing-stat-number {
    display: block;
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
  }
  .landing-stat-label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #aaa;
    font-weight: 600;
    margin-top: 4px;
  }
  .landing-stat-divider {
    width: 1px;
    height: 32px;
    background: #eee;
  }
  .landing-note {
    font-size: 13px;
    color: #aaa;
    margin-top: 24px;
    max-width: 320px;
    line-height: 1.5;
  }
  .landing-credit {
    font-size: 12px;
    color: #ccc;
    margin-top: 20px;
    text-align: center;
  }
  .landing-socials {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 8px;
  }
  .landing-socials a {
    color: #bbb;
    transition: color 0.2s;
    display: flex;
  }
  .landing-socials a:hover { color: #555; }

  /* LANDING ANIMATIONS */
  .fade-in {
    opacity: 0;
    transform: translateY(16px);
    animation: landingFadeIn 0.6s ease forwards;
  }

function hexToHSL(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  let max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    let d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1-l);
  const f = n => { const k = (n + h/30) % 12; const c = l - a * Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function applyTheme(hex) {

  const root = document.documentElement.style;
  root.setProperty('--primary', hex);
  root.setProperty('--primary-light', hslToHex(h, Math.min(s, 30), 93));
  root.setProperty('--primary-dark', hslToHex(h, s, Math.max(l - 15, 20)));
  root.setProperty('--bg', hslToHex(h, Math.min(s, 20), 97));
  root.setProperty('--border', hslToHex(h, Math.min(s, 25), 90));
}

function animateNumber(el, target, prefix) {
  if (target === 0) { el.textContent = prefix ? prefix + '0' : '0'; return; }
  const duration = 1200;
  const start = performance.now();
  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(target * eased);
    el.textContent = prefix ? prefix + current.toLocaleString('es-CL') : current.toLocaleString('es-CL');
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

            <p class="card-name" title="${esc(g.name)}">${esc(g.name)}</p>
            <p class="card-price">${formatPrice(g.price)}</p>
            <p class="reserved-by">por ${esc(g.reservedByAnimal || g.reservedBy)}</p>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderAdmin() {
  const all = giftList();
  const editing = editingId ? gifts[editingId] : null;

  let html = `
    <div class="settings-section">
      <h3>\u2699\uFE0F Personalizar</h3>
      <div class="setting-group">
        <div class="setting-label">Nombre del bebe</div>
        <div style="display:flex;gap:8px">
          <input class="input" id="s-baby-name" placeholder="Nombre" value="${esc(appSettings.babyName)}">
          <button class="btn btn-primary" style="width:auto;white-space:nowrap" onclick="saveBabyName()">Guardar</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Evento</div>
        <div class="form-grid">
          <input class="input" id="s-event-place" placeholder="Lugar (ej: Casa de los abuelos)" value="${esc(appSettings.eventPlace || '')}">
          <div style="display:flex;gap:8px">
            <input class="input" id="s-event-date" type="date" value="${appSettings.eventDate || ''}" style="flex:1">
            <input class="input" id="s-event-time" type="time" value="${appSettings.eventTime || ''}" style="flex:0 0 120px">
          </div>
          <button class="btn btn-primary" onclick="saveEvent()">Guardar evento</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Icono del bebe</div>
        <div class="emoji-grid">
          ${BABY_EMOJIS.map(e => `
            <button class="emoji-option ${(appSettings.babyEmoji || '\u{1F476}') === e ? 'active' : ''}"
                    onclick="saveEmoji('${e}')">${e}</button>
          `).join('')}
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Color del tema</div>
        <div class="color-picker-row">
          <div class="color-picker-hex">
            <div class="color-preview" style="background:${appSettings.customColor || '#4a4a4a'}">
              <input type="color" id="s-color-native" value="${appSettings.customColor || '#4a4a4a'}" onchange="onColorPick(this.value)">
            </div>
            <input class="input hex-input" id="s-color-hex" placeholder="#4a4a4a" value="${appSettings.customColor || '#4a4a4a'}" maxlength="7"
              onkeydown="if(event.key==='Enter')applyHexColor()">
            <button class="btn btn-primary" style="width:auto;white-space:nowrap" onclick="applyHexColor()">Aplicar</button>
          </div>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Link para compartir</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input class="input" id="s-share-link" readonly value="${window.location.origin + window.location.pathname + '?s=' + (sessionId || '')}" style="font-size:13px;color:var(--text-secondary)">
          <button class="btn btn-secondary" style="width:auto;white-space:nowrap" onclick="copyShareLink()">Copiar</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">PIN de admin</div>
        <div style="display:flex;gap:8px">
          <input class="input" id="s-new-pin" type="password" placeholder="Nuevo PIN" maxlength="6" style="flex:1">
          <input class="input" id="s-new-pin-confirm" type="password" placeholder="Confirmar" maxlength="6" style="flex:1">
          <button class="btn btn-primary" style="width:auto;white-space:nowrap" onclick="changePin()">Cambiar</button>
        </div>
      </div>
      <div class="setting-group" style="margin-top:28px;padding-top:20px;border-top:1px solid var(--border)">
        <div class="setting-label" style="color:var(--danger)">Zona peligrosa</div>
        <button class="btn btn-danger" onclick="showDeleteSessionModal()">Eliminar este Beibi Shower</button>
      </div>
    </div>

    <div class="admin-form">
      <h3>${editing ? '\u270F\uFE0F Editar regalo' : '\u2795 Agregar regalo'}</h3>
      <div class="form-grid">
        <div><label class="field-label">Nombre del regalo *</label><input class="input" id="f-name" placeholder="Ej: Coche, Cuna, Ropa..." value="${editing ? esc(editing.name) : ''}"></div>
        <div><label class="field-label">URL de la imagen</label><input class="input" id="f-image" placeholder="https://..." value="${editing ? esc(editing.image || '') : ''}"></div>
        <div><label class="field-label">Link de compra</label><input class="input" id="f-link" placeholder="https://..." value="${editing ? esc(editing.link || '') : ''}"></div>
        <div><label class="field-label">Precio (CLP) *</label><input class="input" id="f-price" placeholder="Ej: 29990" type="number" value="${editing ? editing.price : ''}"></div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--text-secondary)">
          <input type="checkbox" id="f-unlimited" ${editing && editing.unlimited ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--primary)">
          Permite multiples reservas (ropa, calcetines, etc.)
        </label>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="saveGift()">
            ${editing ? 'Guardar cambios' : 'Agregar'}
          </button>
          ${editing ? '<button class="btn btn-secondary" onclick="cancelEdit()">Cancelar</button>' : ''}
        </div>
      </div>
    </div>
    ${(() => {
      const totalGifts = all.length;
      const reservedGifts = all.filter(g => g.reservedBy && !g.unlimited).length;
      const unreservedGifts = all.filter(g => !g.reservedBy && !g.unlimited).length;
      const unlimitedGifts = all.filter(g => g.unlimited).length;
      let unlimitedReservations = 0;
      all.filter(g => g.unlimited && g.reservedByList).forEach(g => unlimitedReservations += Object.keys(g.reservedByList).length);
      const totalValue = all.reduce((s, g) => s + (Number(g.price) || 0), 0);
      const reservedValue = all.filter(g => g.reservedBy && !g.unlimited).reduce((s, g) => s + (Number(g.price) || 0), 0);
      const unlimitedValue = all.filter(g => g.unlimited && g.reservedByList).reduce((s, g) => s + (Number(g.price) || 0) * Object.keys(g.reservedByList).length, 0);
      const committedValue = reservedValue + unlimitedValue;
      const pendingValue = totalValue - all.filter(g => g.reservedBy && !g.unlimited).reduce((s, g) => s + (Number(g.price) || 0), 0);
      const pct = totalGifts > 0 ? Math.round((reservedGifts / (totalGifts - unlimitedGifts || 1)) * 100) : 0;
      const uniquePeople = new Set();
      all.forEach(g => {
        if (g.reservedBy && !g.unlimited) uniquePeople.add(g.reservedBy);
        if (g.reservedByList) Object.values(g.reservedByList).forEach(r => uniquePeople.add(typeof r === 'object' ? r.name : r));
      });
      return `
    <div class="admin-stats-card">
      <h3>\u{1F4CA} Resumen</h3>
      <div class="admin-stats-grid">
        <div class="admin-stat-item">
          <span class="admin-stat-value">${totalGifts}</span>
          <span class="admin-stat-desc">Regalos totales</span>
        </div>
        <div class="admin-stat-item">
          <span class="admin-stat-value">${reservedGifts}/${totalGifts - unlimitedGifts}</span>
          <span class="admin-stat-desc">Reservados (${pct}%)</span>
        </div>
        <div class="admin-stat-item">
          <span class="admin-stat-value">${unreservedGifts}</span>
          <span class="admin-stat-desc">Pendientes</span>
        </div>
        <div class="admin-stat-item">
          <span class="admin-stat-value">${uniquePeople.size}</span>
          <span class="admin-stat-desc">Personas</span>
        </div>
        <div class="admin-stat-item">
          <span class="admin-stat-value">${formatPrice(committedValue)}</span>
          <span class="admin-stat-desc">Comprometido</span>
        </div>
        <div class="admin-stat-item">
          <span class="admin-stat-value">${formatPrice(pendingValue)}</span>
          <span class="admin-stat-desc">Por cubrir</span>
        </div>
        <div class="admin-stat-item">
          <span class="admin-stat-value">${formatPrice(totalValue)}</span>
          <span class="admin-stat-desc">Valor total lista</span>
        </div>
        ${unlimitedGifts > 0 ? `
        <div class="admin-stat-item">
          <span class="admin-stat-value">${unlimitedReservations}</span>
          <span class="admin-stat-desc">Reservas ilimitados</span>
        </div>` : ''}
      </div>
      ${totalGifts - unlimitedGifts > 0 ? `
      <div class="admin-progress">
        <div class="admin-progress-bar" style="width:${pct}%"></div>
      </div>
      <p class="admin-progress-label">${pct}% de los regalos reservados</p>` : ''}
    </div>`;
    })()}
    <p class="section-title">Regalos (${all.length})</p>
    <div class="admin-list">
  `;

  if (all.length === 0) {
    html += '<div class="empty">Agrega el primer regalo arriba</div>';
  } else {
    all.forEach(g => {
      const reservers = g.unlimited && g.reservedByList ? Object.values(g.reservedByList) : [];
      const hasReservers = g.reservedBy || reservers.length > 0;
      const adminReservers = reservers.map(r => typeof r === 'object' ? `${r.name} (${r.animal})` : r);
      html += `
        <div class="admin-row">
          <div class="info">
            <p>${esc(g.name)}${g.unlimited ? ' <span style="font-size:11px;color:var(--success);font-weight:600">\u221E</span>' : ''}</p>
            <p>${formatPrice(g.price)}${g.reservedBy && !g.unlimited ? `<span class="reserved-link">\u2192 ${esc(g.reservedBy)}${g.reservedByAnimal ? ' (' + esc(g.reservedByAnimal) + ')' : ''}</span>` : ''}${adminReservers.length > 0 ? `<span class="reserved-link">\u2192 ${adminReservers.map(r => esc(r)).join(', ')}</span>` : ''}</p>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="startEdit('${g.id}')">Editar</button>
          ${hasReservers ? `<button class="btn btn-warn btn-sm" onclick="unreserve('${g.id}')">Liberar</button>` : ''}
          <button class="btn btn-danger btn-sm" onclick="showDeleteModal('${g.id}')">\u2715</button>
        </div>`;
    });
  }
  html += `</div>`;
  return html;
}

// --- ACTIONS ---
function switchView(v) { currentView = v; render(); }
function setViewMode(mode) { viewMode = mode; localStorage.setItem('viewMode', mode); render(); }
function setSortMode(mode) { sortMode = mode; localStorage.setItem('sortMode', mode); render(); }

function sortGifts(list) {
  if (sortMode === 'price-asc') return [...list].sort((a, b) => (a.price || 0) - (b.price || 0));
  if (sortMode === 'price-desc') return [...list].sort((a, b) => (b.price || 0) - (a.price || 0));
  if (sortMode === 'alpha') return [...list].sort((a, b) => (a.name || '').localeCompare(b.name || '', 'es'));
  return list;
}

function showPinModal() {
  dbAdmin.child("pinHash").once("value", snap => {
    const hasPin = snap.exists();
    if (!hasPin) {
      showModal(`
        <h3>\u{1F512} Crear PIN de admin</h3>
        <p class="sub">Es tu primera vez. Crea un PIN para proteger el panel de admin.</p>
        <input class="input pin-input" id="pin" type="password" maxlength="6" placeholder="\u2022\u2022\u2022\u2022" autofocus
          onkeydown="if(event.key==='Enter')document.getElementById('pin-confirm').focus()">
        <input class="input pin-input" id="pin-confirm" type="password" maxlength="6" placeholder="Confirmar PIN" style="margin-top:12px"
          onkeydown="if(event.key==='Enter')createPin()">
        <div id="pin-error"></div>
        <button class="btn btn-primary" onclick="createPin()">Crear PIN</button>
      `);
    } else {
      showModal(`
        <h3>\u{1F512} Ingresa el PIN</h3>
        <input class="input pin-input" id="pin" type="password" maxlength="6" placeholder="\u2022\u2022\u2022\u2022" autofocus
          onkeydown="if(event.key==='Enter')checkPin()">
        <div id="pin-error"></div>
        <button class="btn btn-primary" onclick="checkPin()">Entrar</button>
      `);
    }
    setTimeout(() => { const el = document.getElementById("pin"); if (el) el.focus(); }, 100);
  });
}

async function createPin() {
  const pin = document.getElementById("pin").value;
  const confirm = document.getElementById("pin-confirm").value;
  if (!pin || pin.length < 4) {
    document.getElementById("pin-error").innerHTML = '<p class="error">El PIN debe tener al menos 4 digitos</p>';
    return;
  }
  if (pin !== confirm) {
    document.getElementById("pin-error").innerHTML = '<p class="error">Los PINs no coinciden</p>';
    return;
  }
  const hashed = await hashPin(pin);
  await dbAdmin.set({ pinHash: hashed });
  currentView = "admin";
  closeModal();
  render();
  notify("PIN creado. No lo olvides!");
}

async function checkPin() {
  const pin = document.getElementById("pin").value;
  if (!pin) return;
  const hashed = await hashPin(pin);
  const snap = await dbAdmin.child("pinHash").once("value");
  if (snap.val() === hashed) {
    currentView = "admin";
    closeModal();
    render();
  } else {
    document.getElementById("pin").classList.add("error");
    document.getElementById("pin-error").innerHTML = '<p class="error">PIN incorrecto</p>';
  }
}

function saveGift() {
  const name = $("#f-name").value.trim();
  const image = $("#f-image").value.trim();
  const link = $("#f-link").value.trim();
  const price = $("#f-price").value;
  const unlimited = $("#f-unlimited").checked;
  if (!name || !price) return notify("Completa nombre y precio", "error");

  const data = { name, image, link, price: Number(price), unlimited, reservedBy: null };

  if (editingId) {
    const prev = gifts[editingId];
    data.reservedBy = prev.reservedBy || null;
    if (prev.reservedByList) data.reservedByList = prev.reservedByList;
    dbGifts.child(editingId).set(data);
    editingId = null;
    notify("Regalo actualizado");
  } else {
    dbGifts.push(data);
    notify("Regalo agregado");
  }
}

function startEdit(id) {
  editingId = id;
  render();
  setTimeout(() => {
    const form = document.querySelector('.admin-form');
    if (form) form.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function cancelEdit() { editingId = null; render(); }

function showDeleteModal(id) {
  const g = gifts[id];
  showModal(`
    <h3>\u26A0\uFE0F Eliminar regalo</h3>
    <p class="sub">\u00BFSeguro que quieres eliminar "${esc(g.name)}"?</p>
    <div class="btn-row">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1;background:var(--danger)" onclick="deleteGift('${id}')">Eliminar</button>
    </div>
  `);
}

function deleteGift(id) { dbGifts.child(id).remove(); closeModal(); notify("Regalo eliminado"); }

function showHelpModal() {
  showModal(`
    <h3>\u{1F44B} \u00BFComo funciona?</h3>
    <ol style="padding-left:20px;line-height:1.8;font-size:14px;margin-bottom:16px">
      <li>Elige un regalo de la lista que te gustaria llevar</li>
      <li>Presiona <strong>"Lo llevo yo"</strong> e ingresa tu nombre y apellido</li>
      <li>El regalo quedara reservado a tu nombre para que nadie mas lo repita</li>
    </ol>
    <p style="font-size:13px;color:var(--text-secondary)">Los regalos marcados con <strong>\u221E</strong> pueden ser llevados por varias personas.</p>
    <button class="btn btn-primary" onclick="closeModal()">Entendido</button>
  `);
}

function showReserveModal(id) {
  const g = gifts[id];
  showModal(`
    <h3>\u{1F381} Reservar regalo</h3>
    <p class="sub">${esc(g.name)} \u2014 ${formatPrice(g.price)}</p>
    <div style="display:flex;flex-direction:column;gap:12px">
      <input class="input" id="guest-name" placeholder="Tu nombre *" autofocus
        onkeydown="if(event.key==='Enter')document.getElementById('guest-lastname').focus()">
      <input class="input" id="guest-lastname" placeholder="Tu apellido *"
        onkeydown="if(event.key==='Enter')reserveGift('${id}')">
    </div>
    <button class="btn btn-primary" onclick="reserveGift('${id}')">Confirmar reserva</button>
  `);
  setTimeout(() => { const el = document.getElementById("guest-name"); if (el) el.focus(); }, 100);
}

function reserveGift(id) {
  const name = document.getElementById("guest-name").value.trim();
  const lastname = document.getElementById("guest-lastname").value.trim();
  if (!name || !lastname) return notify("Ingresa tu nombre y apellido", "error");
  const fullName = name + " " + lastname;
  const animal = pickAnimalName();
  const gift = gifts[id];
  if (gift && gift.unlimited) {
    dbGifts.child(id).child("reservedByList").push({ name: fullName, animal: animal });
  } else {
    dbGifts.child(id).update({ reservedBy: fullName, reservedByAnimal: animal });
  }
  closeModal();
  notify("Reservado como " + animal);
}

function unreserve(id) {
  const gift = gifts[id];
  if (gift && gift.unlimited) {
    dbGifts.child(id).child("reservedByList").remove();
  } else {
    dbGifts.child(id).update({ reservedBy: null, reservedByAnimal: null });
  }
  notify("Reserva cancelada");
}

// --- SETTINGS ---
function saveEvent() {
  const place = document.getElementById("s-event-place").value.trim();
  const date = document.getElementById("s-event-date").value;
  const time = document.getElementById("s-event-time").value;
  dbSettings.update({ eventPlace: place, eventDate: date, eventTime: time });
  notify("Evento actualizado");
}

function saveBabyName() {
  const name = document.getElementById("s-baby-name").value.trim();
  if (!name) return notify("Ingresa un nombre", "error");
  dbSettings.update({ babyName: name });
  notify("Nombre actualizado");
}

function saveEmoji(emoji) {
  dbSettings.update({ babyEmoji: emoji });
  notify("Icono actualizado");
}

function onColorPick(hex) {
  const hexInput = document.getElementById("s-color-hex");
  if (hexInput) hexInput.value = hex;
  applyTheme(hex);
  dbSettings.update({ customColor: hex });
  notify("Color actualizado");
}

function applyHexColor() {
  let hex = document.getElementById("s-color-hex").value.trim();
  if (!hex.startsWith('#')) hex = '#' + hex;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return notify("Ingresa un color hex valido (ej: #4a4a4a)", "error");
  const nativePicker = document.getElementById("s-color-native");
  if (nativePicker) nativePicker.value = hex;
  applyTheme(hex);
  dbSettings.update({ customColor: hex });
  notify("Color actualizado");
}

function showDeleteSessionModal() {
  showModal(`
    <h3>\u26A0\uFE0F Eliminar Beibi Shower</h3>
    <p class="sub">Esto eliminara todos los regalos, reservas y configuracion de este baby shower. Esta accion no se puede deshacer.</p>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Escribe <strong>${esc(appSettings.babyName)}</strong> para confirmar:</p>
    <input class="input" id="delete-confirm" placeholder="Nombre del bebe" autofocus>
    <div class="btn-row">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1;background:var(--danger)" onclick="deleteSession()">Eliminar</button>
    </div>
  `);
  setTimeout(() => { const el = document.getElementById("delete-confirm"); if (el) el.focus(); }, 100);
}

async function deleteSession() {
  const confirm = document.getElementById("delete-confirm").value.trim();
  if (confirm !== appSettings.babyName) return notify("El nombre no coincide", "error");
  await db.ref("sessions/" + sessionId).remove();
  closeModal();
  window.location.search = '';
}

function copyShareLink() {
  const input = document.getElementById("s-share-link");
  navigator.clipboard.writeText(input.value).then(() => notify("Link copiado al portapapeles"));
}

async function changePin() {
  const pin = document.getElementById("s-new-pin").value;
  const confirm = document.getElementById("s-new-pin-confirm").value;
  if (!pin || pin.length < 4) return notify("El PIN debe tener al menos 4 digitos", "error");
  if (pin !== confirm) return notify("Los PINs no coinciden", "error");
  const hashed = await hashPin(pin);
  await dbAdmin.set({ pinHash: hashed });
  document.getElementById("s-new-pin").value = '';
  document.getElementById("s-new-pin-confirm").value = '';
  notify("PIN actualizado");
}

// --- MODAL UTILS ---
function showModal(content) {
  let overlay = document.getElementById("modal-overlay");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "modal-overlay";
    overlay.className = "modal-overlay";
    overlay.onclick = e => { if (e.target === overlay) closeModal(); };
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<div class="modal">${content}</div>`;
  overlay.style.display = "flex";
}

function closeModal() {
  const overlay = document.getElementById("modal-overlay");
  if (overlay) overlay.style.display = "none";
}

function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
